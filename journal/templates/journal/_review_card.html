<div class="card collapsible">
  <div class="card-summary">
    <div class="card-title">{{ entry.title }}</div>
  </div>
  <div class="card-detail">
    <div class="card-body-preview">{{ entry.body }}</div>

    <div class="comments">
      {% for comment in entry.comments.all %}
        <div class="comment">
          <div class="comment-body">{{ comment.body }}</div>
          <div class="comment-meta">{{ comment.created_at|date:"j M, g:i A" }}</div>
        </div>
      {% endfor %}
    </div>
    <form class="comment-form" action="{% url 'journal:add_comment' entry.pk %}" method="post">
      {% csrf_token %}
      <input type="text" name="body" placeholder="Add a note..." autocomplete="off" required>
      <button type="submit" class="comment-submit-btn">Add</button>
    </form>
    <div class="comment-error"></div>

    <div class="card-actions">
      <form method="post" action="{% url 'journal:mark_done' entry.pk %}">
        {% csrf_token %}
        <button type="submit" class="done-btn">Done</button>
      </form>
      <form method="post" action="{% url 'journal:remind_tomorrow' entry.pk %}">
        {% csrf_token %}
        <button type="submit" class="remind-btn">Remind me tomorrow</button>
      </form>
    </div>
  </div>
</div>
